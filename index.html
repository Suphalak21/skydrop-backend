<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SkyDrop Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

.center-screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;   
  align-items: center;       
  gap: 20px;
}

.main-btn {
  width: 260px;
  padding: 18px 0;
  font-size: 20px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  color: white;
  transition: 0.2s ease;
}

#connectBtn {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
}

#connectBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,198,255,0.7);
}

.start-btn {
  background: linear-gradient(45deg, #00ff94, #00c853);
}

.start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,255,148,0.7);
}
.big-btn {
  width: 280px;
  padding: 20px 0;
  font-size: 22px;
}

.hidden {
  display: none;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  font-size: 18px;
}

#gameArea {
  width: 100%;
  height: 400px;
  background: rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  margin-top: 20px;
}

.coin, .bomb {
  position: absolute;
  width: 40px;
  height: 40px;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
}

.player {
  position: absolute;
  bottom: 10px;
  width: 100px;
  height: 15px;
  background: gold;
  border-radius: 10px;
}

.restart-btn {
  margin-top: 15px;
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: crimson;
  color: white;
  cursor: pointer;
}

.game-over {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
}

.game-over.show {
  display: flex;
}

.modal-box {
  width: 90%;
  max-width: 420px;
  background: #1e2a38;
  border: 3px solid #00cfff;
  border-radius: 25px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,255,150,0.4);
  animation: pop 0.3s ease;
}

@keyframes pop {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.success-title {
  color: #00ff94;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 0 0 15px #00ff94;
  margin-bottom: 15px;
}


.address-text {
  font-size: 14px;
  color: #ffffff;
  word-break: break-all;
  margin-bottom: 25px;
  padding: 0 10px;
}

.continue-btn {
  width: 70%;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  background: linear-gradient(45deg, #00ff94, #00cfff);
  color: #003b2f;
  transition: 0.2s;
}

.continue-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ff94;
}
#playAgainBtn {
  background: linear-gradient(45deg, #00c6ff, #0072ff);
  color: white;
}

#playAgainBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,198,255,0.7);
}
</style>
</style>
</head>

<body>

<div id="startScreen" class="center-screen">
  <h1>🚀</h1>
  <h1>SkyDrop Game</h1>
  <button id="connectBtn" class="main-btn">Connect Wallet</button>
  <button id="startBtn" class="main-btn start-btn hidden">Start Game</button>
</div>

<div id="gameUI" class="hidden">
  <div class="top-bar">
    <div id="walletDisplay">Not Connected</div>
    <div id="scoreBoard">Score: 0</div>
    <div id="highScoreBoard">High Score: 0</div>
  </div>

  <div id="gameArea">
    <div id="player" class="player"></div>
  </div>

  <button id="restartBtn" class="restart-btn">Restart</button>

  <div id="historyBox" style="
    margin-top:20px;
    background: rgba(0,0,0,0.3);
    padding:15px;
    border-radius:10px;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;">
    <h3>Last 5 Games</h3>
    <ul id="historyList" style="list-style:none; padding:0;"></ul>
  </div>
</div>

<!-- GAME OVER MODAL -->
<div id="gameOverModal" class="game-over hidden">
  <div class="modal-box">
    <h2>💀 Game Over</h2>
    <p id="finalScoreText"></p>
    <p id="rewardText"></p>
    <button id="playAgainBtn" class="main-btn">Play Again</button>
  </div>
</div>
<!-- CONNECT SUCCESS MODAL -->
<div id="connectModal" class="game-over">
  <div class="modal-box">

    <div class="success-title">
      ✔ Wallet Connected
    </div>

    <div id="connectedAddressText" class="address-text"></div>

    <button id="closeConnectModal" class="continue-btn">
      Continue
    </button>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.10.0/ethers.umd.min.js"></script>

<script>
    sessionStorage.removeItem("gameHistory");
let playerAddress = null;
let score = 0;
let highScore = 0;
let gameInterval = null;
let gameRunning = false;
let gameHistory = JSON.parse(sessionStorage.getItem("gameHistory")) || [];

const connectBtn = document.getElementById("connectBtn");
const startBtn = document.getElementById("startBtn");
const startScreen = document.getElementById("startScreen");
const gameUI = document.getElementById("gameUI");
const walletDisplay = document.getElementById("walletDisplay");
const scoreBoard = document.getElementById("scoreBoard");
const highScoreBoard = document.getElementById("highScoreBoard");
const restartBtn = document.getElementById("restartBtn");
const gameArea = document.getElementById("gameArea");
const player = document.getElementById("player");

let playerX = 0;
let keys = {};

// CONNECT
connectBtn.onclick = async () => {
  if (!window.ethereum) {
    alert("Please install MetaMask");
    return;
  }

  const provider = new ethers.BrowserProvider(window.ethereum);
  const accounts = await provider.send("eth_requestAccounts", []);
  playerAddress = accounts[0];

  walletDisplay.innerText =
    playerAddress.slice(0, 6) + "..." + playerAddress.slice(-4);

  // 🔥 แสดง modal กลางจอ
  document.getElementById("connectedAddressText").innerText =
    playerAddress;

  document.getElementById("connectModal").classList.add("show");

  connectBtn.classList.add("hidden");
  startBtn.classList.remove("hidden");

  document.getElementById("closeConnectModal").onclick = () => {
  document.getElementById("connectModal").classList.remove("show");
};
};

// START
startBtn.onclick = () => {
  if (!playerAddress) {
    alert("Connect wallet first");
    return;
  }

  startScreen.classList.add("hidden");
  gameUI.classList.remove("hidden");
  startGame();
};

restartBtn.onclick = () => {
  resetGame();
  startGame();
};

function startGame() {

  clearInterval(gameInterval);
  gameRunning = false; // 🔥 reset state ก่อน

  score = 0;
  scoreBoard.innerText = "Score: 0";

  playerX = (gameArea.offsetWidth - player.offsetWidth) / 2;
  player.style.left = playerX + "px";

  // 🔥 รอ 1 วิ ก่อนเริ่ม spawn
  setTimeout(() => {
    gameRunning = true;
    requestAnimationFrame(movePlayer);
    gameInterval = setInterval(spawnItem, 800);
  }, 1000);

  renderHistory();
}

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function movePlayer() {
  if (!gameRunning) return;

  if (keys["ArrowLeft"]) playerX -= 8;
  if (keys["ArrowRight"]) playerX += 8;

  if (playerX < 0) playerX = 0;
  if (playerX > gameArea.offsetWidth - player.offsetWidth)
    playerX = gameArea.offsetWidth - player.offsetWidth;

  player.style.left = playerX + "px";
  requestAnimationFrame(movePlayer);
}

function spawnItem() {
  if (!gameRunning) return;

  const item = document.createElement("div");
  const isBomb = Math.random() < 0.3;

  item.className = isBomb ? "bomb" : "coin";
  item.style.backgroundImage = isBomb
    ? "url('images/icons2.png')"
    : "url('images/icons1.png')";

  item.style.left = Math.random() * (gameArea.offsetWidth - 40) + "px";
  item.style.top = "0px";

  gameArea.appendChild(item);

  const fall = setInterval(() => {
    if (!gameRunning) {
      clearInterval(fall);
      return;
    }

    item.style.top = item.offsetTop + 5 + "px";

    const itemLeft = item.offsetLeft;
    const itemRight = itemLeft + item.offsetWidth;
    const itemBottom = item.offsetTop + item.offsetHeight;

    const playerLeft = playerX;
    const playerRight = playerX + player.offsetWidth;
    const playerTop = player.offsetTop; // ตำแหน่ง player โดยประมาณ

    if (
        itemBottom >= playerTop &&
        itemRight > playerLeft &&
        itemLeft < playerRight
        ) {
      if (isBomb) gameOver();
      else {
        score++;
        scoreBoard.innerText = "Score: " + score;
      }

      item.remove();
      clearInterval(fall);
    }

    if (item.offsetTop > 380) {
      item.remove();
      clearInterval(fall);
    }

  }, 30);
}

function gameOver() {

  if (!gameRunning) return;

  gameRunning = false;
  clearInterval(gameInterval);

  if (score > highScore) {
    highScore = score;
    highScoreBoard.innerText = "High Score: " + highScore;
  }

  const rewardAmount = Math.floor(score / 10);

  saveHistory(score, rewardAmount);

  document.getElementById("finalScoreText").innerText =
    "Score: " + score;

  document.getElementById("rewardText").innerText =
    "Reward: " + rewardAmount + " SkyDrop Token";

  // 🔥 แสดง Game Over ทันที (ไม่รอ blockchain)
  document.getElementById("gameOverModal").classList.add("show");

  // 🔥 ยิงไป backend แบบ background
  if (rewardAmount > 0) {
    fetch("http://localhost:3000/reward", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        playerAddress: playerAddress,
        amount: rewardAmount
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        console.log("Transfer Success:", data.txHash);
      } else {
        console.log("Transfer Failed");
      }
    })
    .catch(err => {
      console.error("Reward error:", err);
    });
  }
}

document.getElementById("playAgainBtn").onclick = () => {
  document.getElementById("gameOverModal").classList.remove("show");
  resetGame();
  startGame();
};

function resetGame() {
  gameRunning = false;
  clearInterval(gameInterval);
  document.querySelectorAll(".coin, .bomb").forEach(el => el.remove());
  score = 0;
  scoreBoard.innerText = "Score: 0";
}

function saveHistory(score, reward) {
  const now = new Date();
  const timeString = now.toLocaleTimeString();

  gameHistory.unshift({ score, reward, time: timeString });
  if (gameHistory.length > 5) gameHistory.pop();

  sessionStorage.setItem("gameHistory", JSON.stringify(gameHistory));
  renderHistory();
}

function renderHistory() {
  const historyList = document.getElementById("historyList");
  historyList.innerHTML = "";

  gameHistory.forEach((game, index) => {
    const li = document.createElement("li");
    li.style.padding = "5px 0";
    li.innerText =
      `#${index + 1} | Score: ${game.score} | Reward: ${game.reward} | ${game.time}`;
    historyList.appendChild(li);
  });
}
</script>

</body>
</html>
